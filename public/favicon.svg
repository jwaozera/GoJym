<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="100%" style="stop-color:#141824"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8F5E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dumbbell icon stylized -->
  <g transform="translate(256, 256)">
    <!-- Bar -->
    <rect x="-100" y="-8" width="200" height="16" rx="8" fill="url(#accent)"/>
    <!-- Left weight -->
    <rect x="-130" y="-40" width="30" height="80" rx="8" fill="url(#accent)"/>
    <rect x="-145" y="-50" width="20" height="100" rx="6" fill="url(#accent)" opacity="0.8"/>
    <!-- Right weight -->
    <rect x="100" y="-40" width="30" height="80" rx="8" fill="url(#accent)"/>
    <rect x="125" y="-50" width="20" height="100" rx="6" fill="url(#accent)" opacity="0.8"/>
  </g>
  <!-- GoJym text -->
  <text x="256" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Inter, sans-serif" font-weight="700" font-size="64" letter-spacing="4">GoJym</text>
</svg>